        // --- 位置與縮放調整視窗 ---
        function TransformModal({ sticker, onSave, onCancel }) {
            const canvasRef = useRef(null);
            const [offset, setOffset] = useState(sticker.offset || { x: 0, y: 0 });
            const [scale, setScale] = useState(sticker.scale || 1.0);
            const [isDragging, setIsDragging] = useState(false);
            const [startPos, setStartPos] = useState({ x: 0, y: 0 });
            const backupCanvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = 370;
                canvas.height = 320;
                
                const bCanvas = document.createElement('canvas');
                bCanvas.width = sticker.rawCanvas.width;
                bCanvas.height = sticker.rawCanvas.height;
                bCanvas.getContext('2d').drawImage(sticker.rawCanvas, 0, 0);
                backupCanvasRef.current = bCanvas;
                
                render(offset, scale);
            }, [sticker]);

            const render = (currOffset, currScale) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const drawW = backupCanvasRef.current.width * currScale;
                const drawH = backupCanvasRef.current.height * currScale;
                const centerX = (canvas.width - drawW) / 2 + currOffset.x;
                const centerY = (canvas.height - drawH) / 2 + currOffset.y;
                
                ctx.drawImage(backupCanvasRef.current, centerX, centerY, drawW, drawH);
            };

            const startDrag = (e) => {
                setIsDragging(true);
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setStartPos({ x: clientX - offset.x, y: clientY - offset.y });
            };

            const drag = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const newOffset = { x: clientX - startPos.x, y: clientY - startPos.y };
                setOffset(newOffset);
                render(newOffset, scale);
            };

            const stopDrag = () => setIsDragging(false);

            const handleScaleChange = (val) => {
                const newScale = parseFloat(val);
                setScale(newScale);
                render(offset, newScale);
            };

            const handleSave = (applyToAll = false) => {
                onSave(offset, scale, applyToAll);
            };

            return (
                <div className="fixed inset-0 z-[110] bg-slate-900/90 flex flex-col items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                            <div><h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><IconMove /> 調整位置與縮放</h3></div>
                            <button onClick={onCancel} className="p-2 hover:bg-slate-200 rounded-full text-slate-400"><IconX /></button>
                        </div>
                        <div className="p-8 flex flex-col items-center justify-center bg-slate-200">
                            <div className="checkerboard border-4 border-white shadow-xl rounded-lg overflow-hidden cursor-move relative mb-6" style={{ width: '370px', height: '320px' }}>
                                <canvas 
                                    ref={canvasRef} 
                                    onMouseDown={startDrag} 
                                    onMouseMove={drag} 
                                    onMouseUp={stopDrag} 
                                    onMouseLeave={stopDrag} 
                                    onTouchStart={startDrag} 
                                    onTouchMove={drag} 
                                    onTouchEnd={stopDrag} 
                                    className="touch-none" 
                                />
                            </div>
                            <div className="w-full max-w-sm bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                <div className="text-indigo-600"><IconZoomIn /></div>
                                <input 
                                    type="range" 
                                    min="0.1" 
                                    max="5.0" 
                                    step="0.01" 
                                    value={scale} 
                                    onChange={(e) => handleScaleChange(e.target.value)} 
                                    className="flex-grow h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer" 
                                />
                                <span className="text-xs font-mono font-bold text-slate-400 w-12">{Math.round(scale * 100)}%</span>

                            <button onClick={() => handleSave(true)} className="px-6 py-3 rounded-xl font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 flex items-center gap-2 transition-all"><IconCopy /> 套用至所有</button>

                        </div>
                    </div>
                </div>
            );
        }

        // --- 橡皮擦視窗組件 ---
        function EraserModal({ sticker, onSave, onCancel }) {
            const canvasRef = useRef(null);
            const [brushSize, setBrushSize] = useState(20);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = sticker.rawCanvas.width;
                canvas.height = sticker.rawCanvas.height;
                ctx.drawImage(sticker.rawCanvas, 0, 0);
            }, [sticker]);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            };

            const startDrawing = (e) => { setIsDrawing(true); draw(e); };
            const stopDrawing = () => { setIsDrawing(false); canvasRef.current.getContext('2d').beginPath(); };
            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getPos(e);
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
            };

            const handleSave = () => {
                const newRaw = document.createElement('canvas');
                newRaw.width = canvasRef.current.width;
                newRaw.height = canvasRef.current.height;
                newRaw.getContext('2d').drawImage(canvasRef.current, 0, 0);
                onSave(newRaw);
            };

            return (
                <div className="fixed inset-0 z-[100] bg-slate-900/90 flex flex-col items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                            <div><h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><IconEraser /> 手動修圖去背</h3></div>
                            <button onClick={onCancel} className="p-2 hover:bg-slate-200 rounded-full text-slate-400"><IconX /></button>
                        </div>
                        <div className="flex-grow overflow-auto p-8 flex items-center justify-center bg-slate-200">
                            <div className="checkerboard shadow-inner rounded-lg overflow-hidden cursor-crosshair">
                                <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseUp={stopDrawing} onMouseMove={draw} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchEnd={stopDrawing} onTouchMove={draw} className="max-w-full max-h-[50vh] touch-none" />
                            </div>
                        </div>
                        <div className="p-6 bg-slate-50 border-t flex flex-col md:flex-row gap-6 items-center justify-between">
                            <div className="flex items-center gap-4 w-full md:w-1/2">
                                <span className="text-sm font-bold text-slate-500 whitespace-nowrap">筆刷大小</span>
                                <input type="range" min="1" max="100" value={brushSize} onChange={(e) => setBrushSize(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                            </div>
                            <div className="flex gap-3 w-full md:w-auto">
                                <button onClick={onCancel} className="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">取消</button>
                                <button onClick={handleSave} className="px-8 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg flex items-center justify-center gap-2 transition-all"><IconCheck /> 儲存套用</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 手動分割線調整視窗 ---
        function GridModal({ image, gridX, gridY, setGridX, setGridY, onDone, onCancel }) {
            const previewRef = useRef(null);
            const [isMaximized, setIsMaximized] = useState(false);
            
            const handleGridMove = (type, index, e) => {
                const rect = previewRef.current.getBoundingClientRect();
                const move = (moveEvent) => {
                    const clientX = moveEvent.touches ? moveEvent.touches[0].clientX : moveEvent.clientX;
                    const clientY = moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY;
                    if (type === 'x') {
                        const val = (clientX - rect.left) / rect.width;
                        if (val > 0 && val < 1) {
                            const next = [...gridX]; next[index] = val;
                            setGridX(next);
                        }
                    } else {
                        const val = (clientY - rect.top) / rect.height;
                        if (val > 0 && val < 1) {
                            const next = [...gridY]; next[index] = val;
                            setGridY(next);
                        }
                    }
                };
                const end = () => {
                    window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', end);
                    window.removeEventListener('touchmove', move); window.removeEventListener('touchend', end);
                };
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
                window.addEventListener('touchmove', move); window.addEventListener('touchend', end);
            };

            return (
                <div className="fixed inset-0 z-[120] bg-slate-900/95 flex flex-col items-center justify-center p-4 backdrop-blur-md">
                    <div className={`bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 ${isMaximized ? 'w-[98vw] h-[95vh]' : 'w-full max-w-5xl max-h-[95vh]'}`}>
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><IconGrid /> 手動調整分割線</h3>
                                <p className="text-xs text-slate-400 mt-1 italic">左右或上下拖動藍色線條來對準貼圖邊界</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => setIsMaximized(!isMaximized)} 
                                    className="flex items-center gap-2 px-3 py-2 bg-white hover:bg-slate-100 border rounded-xl text-slate-600 font-bold text-xs transition-colors"
                                    title={isMaximized ? "縮小視窗" : "放大視窗"}
                                >
                                    {isMaximized ? <><IconMinimize /> 縮小</> : <><IconMaximize /> 放大視圖</>}
                                </button>
                                <button onClick={onCancel} className="p-2 hover:bg-slate-200 rounded-full text-slate-400 transition-colors"><IconX /></button>
                            </div>
                        </div>
                        <div className="flex-grow overflow-auto p-4 md:p-8 flex items-center justify-center bg-slate-200">
                            <div className="relative inline-block shadow-2xl bg-white p-1 rounded-xl transition-all duration-300" ref={previewRef}>
                                <img 
                                    src={image} 
                                    className={`w-auto rounded-lg select-none pointer-events-none transition-all duration-300 ${isMaximized ? 'max-h-[82vh]' : 'max-h-[60vh]'}`} 
                                />
                                <div className="absolute inset-1 z-10">
                                    {gridX.map((x, i) => (
                                        <div key={`x-${i}`} className="absolute top-0 bottom-0 grid-handle-v" style={{ left: `${x * 100}%` }} onMouseDown={(e) => handleGridMove('x', i, e)} onTouchStart={(e) => handleGridMove('x', i, e)} />
                                    ))}
                                    {gridY.map((y, i) => (
                                        <div key={`y-${i}`} className="absolute left-0 right-0 grid-handle-h" style={{ top: `${y * 100}%` }} onMouseDown={(e) => handleGridMove('y', i, e)} onTouchStart={(e) => handleGridMove('y', i, e)} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="p-6 flex gap-3 justify-end bg-slate-50 border-t">
                            <button onClick={onCancel} className="px-8 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">取消</button>
                            <button onClick={onDone} className="px-10 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg flex items-center gap-2 transition-all transform active:scale-95"><IconCheck /> 完成調整</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 主程式 ---
        function App() {
            const [originalImage, setOriginalImage] = useState(null);
            const [processedStickers, setProcessedStickers] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [mainIdx, setMainIdx] = useState(0); 
            const [tabIdx, setTabIdx] = useState(0);   
            const [editingIdx, setEditingIdx] = useState(null);
            const [transformIdx, setTransformIdx] = useState(null);
            const [showGridModal, setShowGridModal] = useState(false);
            
            const [tolerance, setTolerance] = useState(20); 
            const [columns, setColumns] = useState(4); 
            const [rows, setRows] = useState(6);       

            const [gridX, setGridX] = useState([]);
            const [gridY, setGridY] = useState([]);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const x = [];
                for(let i=1; i<columns; i++) x.push(i/columns);
                setGridX(x);
                const y = [];
                for(let i=1; i<rows; i++) y.push(i/rows);
                setGridY(y);
            }, [columns, rows]);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => { setOriginalImage(e.target.result); setProcessedStickers([]); };
                    reader.readAsDataURL(file);
                }
            };

            const processImage = useCallback(async () => {
                if (!originalImage) return;
                setIsProcessing(true);
                await new Promise(resolve => setTimeout(resolve, 50));
                const img = new Image();
                img.src = originalImage;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const width = canvas.width; const height = canvas.height;
                    const pointsX = [0, ...gridX.sort((a,b)=>a-b), 1].map(v => Math.floor(v * width));
                    const pointsY = [0, ...gridY.sort((a,b)=>a-b), 1].map(v => Math.floor(v * height));
                    const baseImageData = ctx.getImageData(0, 0, 1, 1).data;
                    const bgR = baseImageData[0], bgG = baseImageData[1], bgB = baseImageData[2];
                    const isBackground = (r, g, b, a) => a === 0 || (Math.abs(r - bgR) <= tolerance && Math.abs(g - bgG) <= tolerance && Math.abs(b - bgB) <= tolerance);
                    
                    const newStickers = [];
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < columns; c++) {
                            const x1 = pointsX[c], x2 = pointsX[c+1];
                            const y1 = pointsY[r], y2 = pointsY[r+1];
                            const cellWidth = x2 - x1; const cellHeight = y2 - y1;
                            if (cellWidth <= 0 || cellHeight <= 0) continue;
                            const cellData = ctx.getImageData(x1, y1, cellWidth, cellHeight);
                            const pixels = cellData.data;
                            let hasContent = false;
                            for (let i = 0; i < pixels.length; i += 4) {
                                if (isBackground(pixels[i], pixels[i+1], pixels[i+2], pixels[i+3])) { pixels[i+3] = 0; }
                                else { hasContent = true; }
                            }
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = cellWidth; tempCanvas.height = cellHeight;
                            tempCanvas.getContext('2d').putImageData(cellData, 0, 0);

                            // 自動最大化呈現：計算填滿 370x320 的最佳比例
                            const initScale = Math.min(370 / cellWidth, 320 / cellHeight);

                            newStickers.push({ 
                                id: r * columns + c, 
                                rawCanvas: tempCanvas, 
                                isEmpty: !hasContent,
                                offset: { x: 0, y: 0 },
                                scale: initScale
                            });
                        }
                    }
                    setProcessedStickers(newStickers); setIsProcessing(false);
                };
            }, [originalImage, tolerance, columns, rows, gridX, gridY]);

            const applyEraserChange = (idx, newRawCanvas) => {
                const newStickers = [...processedStickers];
                newStickers[idx] = { ...newStickers[idx], rawCanvas: newRawCanvas };
                setProcessedStickers(newStickers);
            };

            const applyTransformChange = (idx, offset, scale, applyToAll = false) => {
                const newStickers = processedStickers.map((s, i) => {
                    if (applyToAll || i === idx) {
                        return { ...s, offset, scale };
                    }
                    return s;
                });
                setProcessedStickers(newStickers);
            };

            const generatePreviewUrl = (sticker) => {
                const canvas = document.createElement('canvas');
                canvas.width = 370;
                canvas.height = 320;
                const ctx = canvas.getContext('2d');
                
                const drawW = sticker.rawCanvas.width * sticker.scale;
                const drawH = sticker.rawCanvas.height * sticker.scale;
                const centerX = (370 - drawW) / 2 + sticker.offset.x;
                const centerY = (320 - drawH) / 2 + sticker.offset.y;
                
                ctx.drawImage(sticker.rawCanvas, centerX, centerY, drawW, drawH);
                return canvas.toDataURL('image/png');
            };

            const downloadAll = async () => {
                const zip = new JSZip(); const folder = zip.folder("stickers");
                
                // 1. 處理 main.png (240x240) - 改為自動縮小以完整看到原圖內容
                const mainObj = processedStickers[mainIdx];
                if (mainObj) {
                    const canvas = document.createElement('canvas'); canvas.width = 240; canvas.height = 240;
                    const ctx = canvas.getContext('2d');
                    const rawW = mainObj.rawCanvas.width;
                    const rawH = mainObj.rawCanvas.height;
                    // 使用 contain 邏輯：計算能完整放入 240x240 的縮放比例
                    const fitScale = Math.min(240 / rawW, 240 / rawH);
                    const drawW = rawW * fitScale;
                    const drawH = rawH * fitScale;
                    ctx.drawImage(mainObj.rawCanvas, (240 - drawW) / 2, (240 - drawH) / 2, drawW, drawH);
                    folder.file("main.png", canvas.toDataURL('image/png').split(',')[1], { base64: true });
                }

                // 2. 處理 tab.png (96x74) - 改為自動縮小以完整看到原圖內容
                const tabObj = processedStickers[tabIdx];
                if (tabObj) {
                    const canvas = document.createElement('canvas'); canvas.width = 96; canvas.height = 74;
                    const ctx = canvas.getContext('2d');
                    const rawW = tabObj.rawCanvas.width;
                    const rawH = tabObj.rawCanvas.height;
                    // 使用 contain 邏輯：計算能完整放入 96x74 的縮放比例
                    const fitScale = Math.min(96 / rawW, 74 / rawH);
                    const drawW = rawW * fitScale;
                    const drawH = rawH * fitScale;
                    ctx.drawImage(tabObj.rawCanvas, (96 - drawW) / 2, (74 - drawH) / 2, drawW, drawH);
                    folder.file("tab.png", canvas.toDataURL('image/png').split(',')[1], { base64: true });
                }

                // 3. 處理數字編號圖
                processedStickers.forEach((sticker, i) => {
                    const url = generatePreviewUrl(sticker);
                    const fileName = (i + 1).toString().padStart(2, '0') + ".png";
                    folder.file(fileName, url.split(',')[1], { base64: true });
                });

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = "line_stickers_package.zip"; link.click();
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col no-select">
                    {showGridModal && <GridModal image={originalImage} gridX={gridX} gridY={gridY} setGridX={setGridX} setGridY={setGridY} onDone={() => setShowGridModal(false)} onCancel={() => setShowGridModal(false)} />}
                    {editingIdx !== null && <EraserModal sticker={processedStickers[editingIdx]} onSave={(canv) => { applyEraserChange(editingIdx, canv); setEditingIdx(null); }} onCancel={() => setEditingIdx(null)} />}
                    {transformIdx !== null && <TransformModal sticker={processedStickers[transformIdx]} onSave={(off, sca, all) => { applyTransformChange(transformIdx, off, sca, all); setTransformIdx(null); }} onCancel={() => setTransformIdx(null)} />}

                    <div className="max-w-7xl mx-auto flex-grow w-full">
                        <header className="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-800 flex items-center gap-3">
                                    <div className="p-2 bg-indigo-600 text-white rounded-lg shadow-indigo-200 shadow-lg"><IconGrid /></div>
                                    貼圖打包工具 (4x6)
                                </h1>
                                <p className="text-slate-500 mt-2 font-medium italic underline decoration-indigo-200 underline-offset-4">專業分割、個別縮放、手動修圖與打包 ZIP</p>
                            </div>
                            {processedStickers.length > 0 && (
                                <button onClick={downloadAll} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl font-bold shadow-xl flex items-center gap-2 transition-all transform hover:scale-105 active:scale-95">
                                    <IconDownload /> 下載 ZIP 打包
                                </button>
                            )}
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <a href="https://gemini.google.com/gem/bda87072df73?usp=sharing" target="_blank" className="block ai-gradient p-5 rounded-2xl text-white shadow-lg hover:shadow-indigo-200 transition-all transform hover:-translate-y-1 group">
                                    <div className="flex items-center gap-3 mb-2">
                                        <div className="p-2 bg-white/20 rounded-lg group-hover:scale-110 transition-transform"><IconSparkles /></div>
                                        <span className="font-bold text-lg tracking-wide">AI 貼圖生成</span>
                                    </div>
                                    <p className="text-xs text-white/80 leading-relaxed">點此開啟阿剛老師製作的 AI 貼圖產生器指令。</p>
                                </a>

                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 border-l-4 border-l-green-500">
                                    <h4 className="font-bold text-slate-800 text-sm flex items-center gap-2 mb-2"><div className="text-green-600"><IconCheck /></div> 如何上架？</h4>
                                    <p className="text-xs text-slate-500 leading-relaxed mb-4">下載 ZIP 後，直接前往 LINE Creators Market 上傳壓縮檔即可申請。</p>
                                    <a href="https://creator.line.me/" target="_blank" className="inline-flex items-center gap-1.5 text-xs font-bold text-green-700 hover:text-green-800 underline decoration-green-300 underline-offset-4">前往 LINE 個人原創市集 <IconExternal /></a>
                                </div>

                                <div className={`relative group border-4 border-dashed rounded-2xl p-4 text-center bg-white border-slate-200 transition-all shadow-sm overflow-hidden ${!originalImage ? 'hover:border-indigo-400 cursor-pointer' : ''}`}>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept="image/*" />
                                    {originalImage ? (
                                        <div className="space-y-4">
                                            <div className="relative">
                                                <img src={originalImage} className="w-full h-auto rounded-lg shadow-md grayscale-[0.2]" />
                                                <button onClick={() => fileInputRef.current.click()} className="absolute top-2 left-2 bg-white/90 hover:bg-white p-2 rounded-lg shadow-lg text-indigo-600 transition-all flex items-center gap-2 text-[10px] font-bold"><div className="scale-75"><IconUpload /></div> 更換素材</button>
                                            </div>
                                            <button onClick={() => setShowGridModal(true)} className="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all"><IconGrid /> 手動調整分割線</button>
                                        </div>
                                    ) : (
                                        <div onClick={() => fileInputRef.current.click()} className="py-10 text-slate-400">
                                            <div className="flex justify-center mb-4"><IconUpload /></div>
                                            <p className="font-semibold text-sm">上傳 4x6 貼圖大圖</p>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-2 mb-6 font-bold text-slate-800"><IconSettings /> 切割參數設定</div>
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">欄位數</label><input type="number" value={columns} onChange={(e) => setColumns(Number(e.target.value))} className="w-full p-2 border rounded-lg bg-slate-50 font-bold text-indigo-600 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                            <div><label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">橫列數</label><input type="number" value={rows} onChange={(e) => setRows(Number(e.target.value))} className="w-full p-2 border rounded-lg bg-slate-50 font-bold text-indigo-600 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-2"><span>自動去背容許度</span><span className="text-indigo-600">{tolerance}</span></div>
                                            <input type="range" min="1" max="100" value={tolerance} onChange={(e) => setTolerance(Number(e.target.value))} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                    </div>
                                    <button onClick={processImage} disabled={!originalImage || isProcessing} className="w-full mt-8 bg-slate-800 hover:bg-black disabled:bg-slate-300 text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 transition-all shadow-lg active:scale-95">
                                        {isProcessing ? "處理中..." : "開始執行分割"}
                                    </button>
                                </div>
                            </div>

                            <div className="lg:col-span-3 bg-white rounded-2xl p-6 shadow-sm border border-slate-200 min-h-[600px]">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-slate-800">分割預覽 (370x320)</h2>
                                    <div className="flex gap-4 text-xs font-bold uppercase">
                                        <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-yellow-400 rounded-full shadow-sm"></div> <span>主要</span></div>
                                        <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-blue-400 rounded-full shadow-sm"></div> <span>標籤</span></div>
                                    </div>
                                </div>

                                {processedStickers.length === 0 ? (
                                    <div className="h-96 flex flex-col items-center justify-center text-slate-300 border-2 border-dashed rounded-2xl bg-slate-50 italic">
                                        <IconGrid />
                                        <p className="mt-4">請上傳圖片後按下「開始執行分割」</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {processedStickers.map((sticker, idx) => (
                                            <div key={idx} className={`relative group border-2 rounded-2xl transition-all p-2 flex flex-col gap-2 bg-white ${mainIdx === idx ? 'border-yellow-400 ring-2 ring-yellow-100' : tabIdx === idx ? 'border-blue-400 ring-2 ring-blue-100' : 'border-slate-100 shadow-sm hover:border-indigo-200'}`}>
                                                <div className="checkerboard rounded-xl relative overflow-hidden bg-slate-50" style={{ aspectRatio: '370 / 320' }}>
                                                    {!sticker.isEmpty && <img src={generatePreviewUrl(sticker)} className="max-w-full max-h-full object-contain drop-shadow-sm" />}
                                                    <span className="absolute top-2 left-2 text-[10px] font-mono text-slate-400 px-2 py-0.5 bg-white/90 rounded-full font-bold shadow-sm">{(idx+1).toString().padStart(2, '0')}</span>
                                                    {!sticker.isEmpty && (
                                                        <div className="absolute bottom-2 right-2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => setTransformIdx(idx)} className="bg-white text-slate-700 p-2 rounded-xl shadow-lg border border-slate-200 hover:bg-slate-50" title="調整位置與縮放"><IconMove /></button>
                                                            <button onClick={() => setEditingIdx(idx)} className="bg-indigo-600 text-white p-2 rounded-xl shadow-lg hover:bg-indigo-700" title="修圖去背"><IconEraser /></button>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 mt-1">
                                                    <label className={`flex items-center justify-center gap-2 text-[10px] p-2 rounded-xl cursor-pointer border transition-colors ${mainIdx === idx ? 'bg-yellow-50 text-yellow-700 border-yellow-200 font-bold' : 'hover:bg-slate-50 text-slate-400 border-transparent'}`}><input type="radio" checked={mainIdx === idx} onChange={() => setMainIdx(idx)} className="w-3 h-3 accent-yellow-500" /> 主要</label>
                                                    <label className={`flex items-center justify-center gap-2 text-[10px] p-2 rounded-xl cursor-pointer border transition-colors ${tabIdx === idx ? 'bg-blue-50 text-blue-700 border-blue-200 font-bold' : 'hover:bg-slate-50 text-slate-400 border-transparent'}`}><input type="radio" checked={tabIdx === idx} onChange={() => setTabIdx(idx)} className="w-3 h-3 accent-blue-500" /> 標籤</label>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <footer className="mt-12 py-8 border-t border-slate-200 text-center">
                        <div className="flex flex-col items-center gap-2">
                            <p className="text-slate-600 font-bold italic">
                                Made by <a href="https://kentxchang.blogspot.tw" target="_blank" className="text-indigo-600 hover:text-indigo-800 underline transition-colors">阿剛老師</a>
                            </p>
                            <p className="text-[10px] text-slate-400 flex flex-col md:flex-row items-center gap-2 max-w-2xl leading-relaxed px-4 italic font-medium">
                                <span className="bg-slate-200 px-2 py-0.5 rounded font-mono shrink-0 font-bold text-slate-600">CC BY-NC-SA 4.0</span>
                                <span>本工具採 CC 授權，非商業用途下可自由分享與修正。調整完成後請務必下載 ZIP 備份。</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
