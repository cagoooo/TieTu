name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Opt every JavaScript-based GitHub Action (checkout, setup-node, pnpm,
# google-github-actions/*, etc.) into Node.js 24 so the deprecation warnings
# go away ahead of the September 2026 hard cutoff.
# (Node 22 is still what we use for our own build commands; the Cloud Functions
#  runtime caps at 22 anyway. This flag only affects the runtime hosting the
#  action plugins themselves.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build SPA (smoke)
        env:
          PORT: 23937
        run: pnpm --filter @workspace/sticker-studio run build

      - name: Build functions (smoke)
        run: pnpm --filter tietu-functions run build
