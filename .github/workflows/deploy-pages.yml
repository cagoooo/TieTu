name: Deploy SPA to GitHub Pages (mirror)

# Mirrors the SPA at https://cagoooo.github.io/TieTu/ as a second public
# entry point. Backend API still lives on Firebase Cloud Functions
# (https://tietu.web.app/api/...) and is reached via VITE_API_BASE_URL.

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sticker-studio/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow only one concurrent Pages deployment, with the latest push winning.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA for GitHub Pages
        env:
          PORT: 23937
          BASE_PATH: /TieTu/
          VITE_API_BASE_URL: https://tietu.web.app
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_FIREBASE_API_KEY: "__FIREBASE_API_KEY__"
          VITE_FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__"
          VITE_FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__"
          VITE_FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__"
          VITE_FIREBASE_APP_ID: "__FIREBASE_APP_ID__"
        run: pnpm --filter @workspace/sticker-studio run build

      - name: Inject Secrets 💉
        run: python .github/inject.py
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: SPA fallback (404.html → index.html)
        # GitHub Pages doesn't natively rewrite SPA routes; copying index.html
        # to 404.html lets Wouter's <Route component={NotFound}> handle deep
        # links like /TieTu/anything correctly on first hit.
        run: cp artifacts/sticker-studio/dist/public/index.html artifacts/sticker-studio/dist/public/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/sticker-studio/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
