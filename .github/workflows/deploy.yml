name: Deploy to Firebase (TieTu)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys; if a new push lands while one is running, queue
# the latest and cancel the in-flight build to avoid pushing stale artifacts.
concurrency:
  group: firebase-tietu-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write    # reserved for future Workload Identity Federation upgrade

# Run every JS action under Node 24 to silence the September 2026 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        env:
          PORT: 23937
          # BASE_PATH defaults to "/" in vite.config.ts. Override only when
          # deploying under a sub-path (e.g. GitHub Pages with default URL).
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: pnpm --filter @workspace/sticker-studio run build

      - name: Build Cloud Functions bundle
        run: pnpm --filter tietu-functions run build

      # Authenticate via the github-actions-tietu service account (its JSON
      # key is stored in the FIREBASE_SERVICE_ACCOUNT secret). The SA has
      # firebasehosting.admin + cloudfunctions.admin + run.admin +
      # iam.serviceAccountUser + cloudbuild.builds.editor +
      # artifactregistry.writer + secretmanager.secretAccessor — i.e. the
      # standard set required to deploy a Firebase Hosting site and a
      # Cloud Functions v2 codebase.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ⚠️ The deploy command is ALWAYS scoped with `--only` flags so we never
      # touch other Firebase projects' resources. We restrict to:
      #   - hosting:tietu       (only the "tietu" hosting target)
      #   - functions:tietu     (only the "tietu" codebase declared in firebase.json)
      # This guards against accidentally deleting other apps' Cloud Functions
      # (notably: the existing Zhuyin app in this same Firebase project).
      - name: Deploy to Firebase
        run: |
          npx --yes firebase-tools@15 deploy \
            --only "hosting:tietu,functions:tietu" \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --force \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
